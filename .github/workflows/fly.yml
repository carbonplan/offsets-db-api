name: fly

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  OFFSETS_DB_API_KEY_STAGING: ${{ secrets.OFFSETS_DB_API_KEY_STAGING }}
  OFFSETS_DB_API_KEY_PRODUCTION: ${{ secrets.OFFSETS_DB_API_KEY_PRODUCTION }}
  PRODUCTION_URL: 'https://offsets-db.fly.dev/docs'
  STAGING_URL: 'https://offsets-db-staging.fly.dev/docs'

jobs:
  deploy-staging:
    name: deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-staging-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}
    if: ${{ (contains(github.event.pull_request.labels.*.name, 'api') && github.event_name == 'pull_request') || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'}}
    outputs:
      staging_seed_type: ${{ steps.classify-staging.outputs.type }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup AWS and pixi
        uses: ./.github/actions/setup
        with:
          role-session-name: offsets-db-fly-role-session
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Staging
        run: |
          flyctl deploy --remote-only --config fly.staging.toml
      - name: Seed Staging Database
        id: seed-staging
        continue-on-error: true
        run: |
          pixi run update-db-staging 2>&1 | tee /tmp/staging-output.txt
          exit ${PIPESTATUS[0]}
      - name: Classify staging failure
        id: classify-staging
        if: steps.seed-staging.outcome == 'failure'
        run: |
          if grep -q "file paths don't exist" /tmp/staging-output.txt; then
            echo "type=missing_data" >> $GITHUB_OUTPUT
          else
            echo "type=unexpected" >> $GITHUB_OUTPUT
          fi
      - name: Fail on unexpected staging error
        if: steps.classify-staging.outputs.type == 'unexpected'
        run: exit 1

  deploy-production:
    name: deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: deploy-staging
    concurrency:
      group: ${{ github.workflow }}-production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup AWS and pixi
        uses: ./.github/actions/setup
        with:
          role-session-name: offsets-db-fly-role-session
      - name: Get Current time in UTC in format YYYY-MM-DD HH:MM
        if: always()
        id: time
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Production
        run: |
          flyctl deploy --remote-only --config fly.prod.toml
      - name: Notify Slack on staging missing data
        if: needs.deploy-staging.outputs.staging_seed_type == 'missing_data'
        uses: slackapi/slack-github-action@v3.0.2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C06CXEYKMBP",
              "attachments": [
                {
                  "color": "#ff9900",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "Staging DB Seed Skipped ⚠️ (Production continuing)"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Reason:*\nStaging S3 data unavailable"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Time:*\n${{ steps.time.outputs.date }} UTC"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Details URL:*\n🔍 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow Run>"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v3.0.2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C06CXEYKMBP",
              "attachments": [
                {
                  "color": "#ff0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "Fly Deployment Failure Alert 🚨"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*GH event:*\n${{ github.event_name }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Time:*\n${{ steps.time.outputs.date }} UTC"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Details URL:*\n🔍 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow Run>"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
      - name: Update Production DB
        run: |
          pixi run update-db-production
