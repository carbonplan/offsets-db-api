services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: offsets_db
      POSTGRES_PASSWORD: offsets_db
      POSTGRES_DB: offsets_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U offsets_db -d offsets_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
